<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC HEX Cleaner</title>
<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .box {
    width: 100%;
    max-width: 800px;
    background: #18181b;
    padding: 20px;
    border-radius: 12px;
  }
  textarea {
    width: 100%;
    height: 180px;
    background: black;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    resize: vertical;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 0;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  button.copy {
    background: #16a34a;
  }
  .label {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="box">
  <h2>MC HEX → Cleaner</h2>

  <textarea id="input" placeholder="Вставь YAML сюда..."></textarea>

  <button onclick="convert()">Convert</button>

  <div class="label">Result:</div>
  <textarea id="out" readonly></textarea>

  <button class="copy" onclick="copyText()">Copy result</button>
</div>

<script>
function extractText(input) {
  let result = "";

  // вытаскиваем символы после HEX
  input.replace(/&#[0-9a-fA-F]{6}(.?)/g, (m, ch) => {
    result += ch;
  });

  // убираем &r
  result = result.replace(/&r/g, "");

  return result;
}

function convert() {
  let text = document.getElementById("input").value;

  let cleanText = extractText(text);

  // ВСЕГДА один цвет (как в примере пользователя)
  let final = "&6" + cleanText;

  document.getElementById("out").value = final;
}

function copyText() {
  const out = document.getElementById("out");
  out.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
