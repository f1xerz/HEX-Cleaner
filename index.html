<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HEX Minecraft Converter</title>
<style>
  body {
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 180px;
    background: #1c1c1c;
    color: #00ff88;
    border: none;
    padding: 10px;
    margin-bottom: 10px;
    font-family: monospace;
  }

  button {
    padding: 10px 15px;
    cursor: pointer;
    margin-right: 10px;
  }

  .box {
    margin-top: 10px;
  }
</style>
</head>
<body>

<h2>HEX → Minecraft Converter</h2>

<textarea id="input" placeholder="Вставь текст с HEX (&#ff0000...)"></textarea>

<button onclick="convert()">Конвертировать</button>
<button onclick="copyText()">Копировать</button>

<div class="box">
<h3>Результат:</h3>
<textarea id="output"></textarea>
</div>

<script>
// HEX → Minecraft (&r&#xxxxxx...)
function convertHex(text) {
  return text.replace(/&#([0-9a-fA-F]{6})(.)/g, (m, hex, char) => {
    return `&r&#${hex}${char}`;
  });
}

// автозамена FunTime → FeverTime
function autoReplace(text) {
  return text.replace(/FunTime/gi, "FeverTime");
}

function convert() {
  let input = document.getElementById("input").value;

  let result = convertHex(input);

  // автофикс названия сервера
  result = autoReplace(result);

  document.getElementById("output").value = result;
}

function copyText() {
  let out = document.getElementById("output");
  out.select();
  document.execCommand("copy");
}
</script>

</body>
</html>
