<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HEX Converter</title>

<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    width: 420px;
    background: #18181b;
    padding: 20px;
    border-radius: 12px;
  }

  textarea {
    width: 100%;
    height: 140px;
    padding: 10px;
    margin: 10px 0;
    background: black;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    resize: none;
    font-family: monospace;
    font-size: 12px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  .gen {
    background: #2563eb;
    color: white;
  }

  .copy {
    background: #16a34a;
    margin-top: 10px;
    color: white;
  }

  .result {
    word-break: break-word;
    font-size: 13px;
    background: black;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    min-height: 80px;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<div class="box">

  <h3>HEX → Minecraft Converter</h3>

  <textarea id="input" placeholder="Вставь HEX или градиент текст..."></textarea>

  <button class="gen" onclick="convert()">Конвертировать</button>

  <div class="result" id="output"></div>

  <button class="copy" onclick="copyText()">Копировать</button>

</div>

<script>
// ===== Minecraft palette =====
const palette = [
  { code: "&0", r: 0, g: 0, b: 0 },
  { code: "&4", r: 170, g: 0, b: 0 },
  { code: "&c", r: 255, g: 85, b: 85 },
  { code: "&6", r: 255, g: 170, b: 0 },
  { code: "&e", r: 255, g: 255, b: 85 },
  { code: "&2", r: 0, g: 170, b: 0 },
  { code: "&a", r: 85, g: 255, b: 85 },
  { code: "&b", r: 85, g: 255, b: 255 },
  { code: "&3", r: 0, g: 170, b: 170 },
  { code: "&9", r: 85, g: 85, b: 255 },
  { code: "&1", r: 0, g: 0, b: 170 },
  { code: "&d", r: 255, g: 85, b: 255 },
  { code: "&5", r: 170, g: 0, b: 170 },
  { code: "&f", r: 255, g: 255, b: 255 }
];

// ===== HEX to RGB =====
function hexToRgb(hex) {
  hex = hex.replace("#", "");
  return {
    r: parseInt(hex.substring(0, 2), 16),
    g: parseInt(hex.substring(2, 4), 16),
    b: parseInt(hex.substring(4, 6), 16)
  };
}

// ===== closest Minecraft color =====
function closestColor(r, g, b) {
  let best = palette[0];
  let bestDist = 999999;

  for (let c of palette) {
    let dist =
      Math.abs(r - c.r) +
      Math.abs(g - c.g) +
      Math.abs(b - c.b);

    if (dist < bestDist) {
      bestDist = dist;
      best = c;
    }
  }
  return best.code;
}

// ===== HEX converter =====
function convertHex(text) {
  return text.replace(/&#([0-9a-fA-F]{6})/g, (m, hex) => {
    let rgb = hexToRgb(hex);
    return closestColor(rgb.r, rgb.g, rgb.b);
  });
}

// ===== auto replace FunTime =====
function autoReplace(text) {
  return text.replace(/FunTime/gi, "FeverTime");
}

// ===== detect exact gradient patterns =====
function detectFunTimeGradient(text) {
  const cleaned = text.replace(/&r/g, "");

  const patterns = [
    "&#ff0000F&#ff1400u&#ff2800n&#ff3c00T&#ff5000i&#ff5000m&#ff3c00e&#ff2800.&#ff1400m&#ff0000e",
    "&#ff6600F&#ff5100u&#ff3d00n&#ff2900T&#ff1500i&#ff1500m&#ff2900e&#ff3d00.&#ff5100m&#ff6600e"
  ];

  for (let p of patterns) {
    if (cleaned.includes(p)) {
      return "&6FeverTime.su";
    }
  }

  return null;
}

// ===== main convert =====
function convert() {
  let input = document.getElementById("input").value;

  // 1. check special gradient
  let detected = detectFunTimeGradient(input);
  if (detected) {
    document.getElementById("output").innerText = detected;
    return;
  }

  // 2. HEX → MC colors
  let result = convertHex(input);

  // 3. auto replace names
  result = autoReplace(result);

  document.getElementById("output").innerText = result.trim();
}

// ===== copy result =====
function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
