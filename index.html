<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gradient Converter</title>
<style>
  body {
    background: #111;
    color: #fff;
    font-family: Arial;
    padding: 20px;
  }
  textarea {
    width: 100%;
    height: 200px;
    background: #222;
    color: #0f0;
    border: none;
    padding: 10px;
    margin-bottom: 10px;
  }
  button {
    padding: 10px 15px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>HEX Gradient → Minecraft Color</h2>

<textarea id="input" placeholder="Вставь текст с HEX градиентом..."></textarea>

<button onclick="convert()">Конвертировать</button>

<h3>Результат:</h3>
<textarea id="output"></textarea>

<script>
function convert() {
  let input = document.getElementById("input").value;

  // FunTime градиент (основной шаблон поиска)
  const funTimePattern = /&r&#ff0000F&r&#ff1400u&r&#ff2800n&r&#ff3c00T&r&#ff5000i&r&#ff5000m&r&#ff3c00e&r&#ff2800\.&r&#ff1400m&r&#ff0000e&r/gi;

  // альтернативный градиент
  const funTimePattern2 = /&r&#ff6600F&r&#ff5100u&r&#ff3d00n&r&#ff2900T&r&#ff1500i&r&#ff1500m&r&#ff2900e&r&#ff3d00\.&r&#ff5100m&r&#ff6600e&r/gi;

  // замена
  let output = input
    .replace(funTimePattern, "&6FeverTime.su")
    .replace(funTimePattern2, "&6FeverTime.su");

  document.getElementById("output").value = output;
}
</script>

</body>
</html>
