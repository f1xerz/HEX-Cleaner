<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC Color Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e03535;
    --text: #d4d4d4;
    --muted: #555;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 32px;
  }

  .top {
    width: 100%; max-width: 860px;
    margin-bottom: 28px;
    text-align: center;
  }

  h1 {
    font-size: 22px; font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.01em;
    text-align: center;
  }

  .editor-grid {
    width: 100%; max-width: 860px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 12px;
  }

  .panel { display: flex; flex-direction: column; }

  .panel-label {
    font-size: 11px; color: var(--muted);
    margin-bottom: 5px; letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  textarea {
    width: 100%; height: 260px; resize: vertical;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Courier New', monospace;
    font-size: 12px; line-height: 1.65;
    padding: 12px; outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #3a3a3a; }
  textarea[readonly] { color: #aaa; }

  .controls {
    width: 100%; max-width: 860px;
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 32px;
  }

  button {
    padding: 7px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer; border: 1px solid var(--border);
    transition: all 0.12s;
  }

  .btn-run {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .btn-run:hover { background: #c42d2d; }

  .btn-copy, .btn-clear {
    background: var(--surface); color: var(--muted);
  }
  .btn-copy:hover, .btn-clear:hover { color: var(--text); border-color: #444; }

  .status { font-size: 11px; color: var(--muted); margin-left: auto; }
  .status.ok { color: #5a5; }
  .status.err { color: var(--accent); }

  .fevertime-note {
    width: 100%; max-width: 860px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 28px;
    display: flex; flex-direction: column; gap: 5px;
  }

  .fevertime-note .note-label {
    font-size: 10px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .fevertime-note code {
    font-size: 11px; color: var(--muted);
    font-family: 'Courier New', monospace;
    word-break: break-all;
  }

  .fevertime-note .arrow { color: var(--accent); margin: 0 6px; }
  .fevertime-note .result { color: var(--accent); }

  .palette-label {
    width: 100%; max-width: 860px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .palette {
    width: 100%; max-width: 860px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }

  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px; color: var(--muted);
    font-family: 'Courier New', monospace;
  }

  .swatch {
    width: 9px; height: 9px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .editor-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="top">
  <h1>FeverConverter</h1>
</div>

<div class="editor-grid">
  <div class="panel">
    <div class="panel-label">Входной текст</div>
    <textarea id="inp" placeholder="Вставьте конфиг с &#rrggbb кодами..."></textarea>
  </div>
  <div class="panel">
    <div class="panel-label">Результат</div>
    <textarea id="out" readonly placeholder="Результат появится здесь..."></textarea>
  </div>
</div>

<div class="controls">
  <button class="btn-run" onclick="convert()">Конвертировать</button>
  <button class="btn-copy" onclick="copyOut()">Копировать</button>
  <button class="btn-clear" onclick="clearAll()">Очистить</button>
  <span class="status" id="status"></span>
</div>



<script>
const MC_COLORS = [
  { code: '0', name: 'black',        hex: '#000000' },
  { code: '1', name: 'dark_blue',    hex: '#0000AA' },
  { code: '2', name: 'dark_green',   hex: '#00AA00' },
  { code: '3', name: 'dark_aqua',    hex: '#00AAAA' },
  { code: '4', name: 'dark_red',     hex: '#AA0000' },
  { code: '5', name: 'dark_purple',  hex: '#AA00AA' },
  { code: '6', name: 'gold',         hex: '#FFAA00' },
  { code: '7', name: 'gray',         hex: '#AAAAAA' },
  { code: '8', name: 'dark_gray',    hex: '#555555' },
  { code: '9', name: 'blue',         hex: '#5555FF' },
  { code: 'a', name: 'green',        hex: '#55FF55' },
  { code: 'b', name: 'aqua',         hex: '#55FFFF' },
  { code: 'c', name: 'red',          hex: '#FF5555' },
  { code: 'd', name: 'light_purple', hex: '#FF55FF' },
  { code: 'e', name: 'yellow',       hex: '#FFFF55' },
  { code: 'f', name: 'white',        hex: '#FFFFFF' },
];

const FEVERTIME_PATTERNS = [
  '&r&#ff6600F&r&#ff5100u&r&#ff3d00n&r&#ff2900T&r&#ff1500i&r&#ff1500m&r&#ff2900e&r&#ff3d00.&r&#ff5100m&r&#ff6600e&r',
  '&r&#ff0000F&r&#ff1400u&r&#ff2800n&r&#ff3c00T&r&#ff5000i&r&#ff5000m&r&#ff3c00e&r&#ff2800.&r&#ff1400m&r&#ff0000e&r',
];

const FEVERTIME_REPLACEMENT = '&6FeverTime.su';

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function colorDistance(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2);
}

function closestMinecraftColor(hex) {
  const rgb = hexToRgb(hex);
  let best = MC_COLORS[0], bestDist = Infinity;
  for (const c of MC_COLORS) {
    const d = colorDistance(rgb, hexToRgb(c.hex));
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return best;
}

function applyFevertimePatterns(text) {
  for (const p of FEVERTIME_PATTERNS)
    while (text.includes(p)) text = text.replace(p, FEVERTIME_REPLACEMENT);
  return text;
}

function convertHexColors(text) {
  return text.replace(/&#([0-9a-fA-F]{6})/g, (_, hex) => '&' + closestMinecraftColor('#' + hex).code);
}

function removeResetCodes(text) {
  return text.replace(/&r/g, '');
}

// Reorders sequences of & codes so &l always comes last,
// colour code sits right before the text it colours.
// e.g. '&l&2Текст' → '&2&lТекст'
function reorderCodes(text) {
  return text.replace(/((?:&[0-9a-flo-uA-FLO-U])+)([^&]*)/g, (match, codes, content) => {
    const codeList = [];
    const re = /&([0-9a-flo-uA-FLO-U])/g;
    let m;
    while ((m = re.exec(codes)) !== null) codeList.push(m[1]);

    const lCodes   = codeList.filter(c => c.toLowerCase() === 'l');
    const otherFmt = codeList.filter(c => /^[nnoumkNOMUK]$/.test(c) && c.toLowerCase() !== 'l');
    const colours  = codeList.filter(c => /^[0-9a-fA-F]$/.test(c));

    const ordered = [...otherFmt, ...colours, ...lCodes];
    return ordered.map(c => '&' + c).join('') + content;
  });
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + (cls||'');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 2200);
}

function convert() {
  const input = document.getElementById('inp').value;
  if (!input.trim()) { setStatus('Вставьте текст', 'err'); return; }
  let r = applyFevertimePatterns(input);
  r = convertHexColors(r);
  r = removeResetCodes(r);
  r = reorderCodes(r);
  document.getElementById('out').value = r;
  setStatus('Готово', 'ok');
}

function copyOut() {
  const val = document.getElementById('out').value;
  if (!val) { setStatus('Нечего копировать', 'err'); return; }
  navigator.clipboard.writeText(val)
    .then(() => setStatus('Скопировано', 'ok'))
    .catch(() => { document.getElementById('out').select(); document.execCommand('copy'); setStatus('Скопировано', 'ok'); });
}

function clearAll() {
  document.getElementById('inp').value = '';
  document.getElementById('out').value = '';
  const el = document.getElementById('status'); el.textContent = ''; el.className = 'status';
}


</script>
</body>
</html>
