<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HEX Converter</title>

<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    width: 420px;
    background: #18181b;
    padding: 20px;
    border-radius: 12px;
  }

  textarea {
    width: 100%;
    height: 140px;
    padding: 10px;
    margin: 10px 0;
    background: black;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    resize: none;
    font-family: monospace;
    font-size: 12px;
  }

  button {
    width: 100%;
    padding: 10px;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }

  .gen {
    background: #2563eb;
    color: white;
  }

  .copy {
    background: #16a34a;
    margin-top: 10px;
    color: white;
  }

  .result {
    word-break: break-word;
    font-size: 13px;
    background: black;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    min-height: 80px;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<div class="box">

  <h3>HEX → Minecraft Converter</h3>

  <textarea id="input" placeholder="Вставь HEX или градиент текст..."></textarea>

  <button class="gen" onclick="convert()">Конвертировать</button>

  <div class="result" id="output"></div>

  <button class="copy" onclick="copyText()">Копировать</button>

</div>

<script>

// удаление HEX и r
function cleanHex(text) {
  return text
    .replace(/&r/g, "")
    .replace(/&#[0-9a-fA-F]{6}/g, "&f"); // вместо удаления → белый цвет
}

function autoReplace(text) {
  return text.replace(/FunTime/gi, "FeverTime");
}

function convert() {
  let input = document.getElementById("input").value;

  let result = cleanHex(input);
  result = autoReplace(result);

  document.getElementById("output").innerText = result.trim();
}
// копирование
function copyText() {
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
