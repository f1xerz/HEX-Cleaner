<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC HEX Cleaner</title>
<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .box {
    width: 600px;
    background: #18181b;
    padding: 20px;
    border-radius: 12px;
  }
  textarea {
    width: 100%;
    height: 200px;
    background: black;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 0;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  .out {
    white-space: pre-wrap;
    margin-top: 10px;
    background: black;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="box">
  <h2>MC HEX → Vanilla Color Cleaner</h2>

  <textarea id="input" placeholder="Вставь YAML сюда..."></textarea>

  <button onclick="convert()">Convert</button>

  <div class="out" id="out"></div>
</div>

<script>
function convert() {
  let text = document.getElementById("input").value;

  // превращаем &#RRGGBB + символ → просто символ
  text = text.replace(/&#[0-9a-fA-F]{6}(.?)/g, "$1");

  // убираем &r (reset)
  text = text.replace(/&r/g, "");

  // вывод
  document.getElementById("out").textContent = text;
}
</script>

</body>
</html>
